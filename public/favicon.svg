<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Main gradient: red → blue → green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>

  <!-- Gradient border ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#bgGrad)" stroke-width="2.5"/>

  <!-- Subtle inner glow corners -->
  <circle cx="0" cy="0" r="20" fill="#ef4444" opacity="0.08"/>
  <circle cx="64" cy="64" r="20" fill="#10b981" opacity="0.08"/>
  <circle cx="64" cy="0" r="16" fill="#3b82f6" opacity="0.06"/>

  <!-- "AA" text centered -->
  <text
    x="32"
    y="42"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="26"
    font-weight="900"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="-1"
  >AA</text>

  <!-- Accent dot under text -->
  <circle cx="32" cy="52" r="2.5" fill="url(#bgGrad)"/>
</svg>
